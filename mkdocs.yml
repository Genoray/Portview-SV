site_name: Portview SV
site_description: IEC 62304 software verification document set
site_url: http://127.0.0.1:8000
site_dir: .site
theme:
  name: material
  custom_dir: overrides
  language: en
  palette:
    - scheme: default
      primary: blue
      accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - toc:
      permalink: true
extra_css:
  - stylesheets/extra.css
plugins:
  - search
nav:
  - Home: index.md
  - SV Documents:
      - Overview: sv/index.md
      - (SV-603-01) Software Validation Report: sv/(SV-603-01) Software Validation Report.md
      - (SV-603-02) Software Development Planning: sv/(SV-603-02) Software Development Planning.md
      - (SV-603-03) Software High Level Design: sv/(SV-603-03) Software High Level Design.md
      - (SV-603-04) Software Verification Plan: sv/(SV-603-04) Software Verification Plan.md
      - (SV-603-05) Software Verification Report: sv/(SV-603-05) Software Verification Report.md
      - (RS-603) RS: sv/(RS-603) RS.md
      - (SRS-603) SwSRS: sv/(SRS-603) SwSRS.md
      - (SDS-603) SwSDS: sv/(SDS-603) SwSDS.md
      - (TM-603) Traceability Matrix: sv/(TM-603) Traceability Matrix.md
      - (STP-603) SwSTP: sv/(STP-603) SwSTP.md
      - (STR-603) SwSTR: sv/(STR-603) SwSTR.md
      - (TP-603) SwTP: sv/(TP-603) SwTP.md
      - (TR-603) SwTR: sv/(TR-603) SwTR.md
      - (SystemTP-603) SystemTP: sv/(SystemTP-603) SystemTP.md
      - (SystemTR-603) SystemTR: sv/(SystemTR-603) SystemTR.md
      - (CSRS-603) SwRS for Cybersecurity: sv/(CSRS-603) SwRS for Cybersecurity.md
      - (FMEA-603) Risks FMEA: sv/(FMEA-603) Risks FMEA.md
      - (NSE-603) Network Security Enclosure: sv/(NSE-603) Network Security Enclosure.md
